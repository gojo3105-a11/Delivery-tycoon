<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 88 46" width="88" height="46">
  <!-- Ground shadow -->
  <ellipse cx="44" cy="44.5" rx="36" ry="3.5" fill="rgba(0,0,0,0.13)"/>

  <!-- Wheels -->
  <circle cx="18" cy="36" r="8" fill="#1A1A2A"/>
  <circle cx="18" cy="36" r="5" fill="#2E3040"/>
  <circle cx="18" cy="36" r="2" fill="#8090A8"/>
  <circle cx="68" cy="36" r="8" fill="#1A1A2A"/>
  <circle cx="68" cy="36" r="5" fill="#2E3040"/>
  <circle cx="68" cy="36" r="2" fill="#8090A8"/>

  <!-- Bus body -->
  <rect x="4" y="2" width="80" height="32" rx="5" fill="#3A72C8"/>

  <!-- Orange delivery stripe -->
  <rect x="4" y="20" width="80" height="8" rx="0" fill="#FF7128"/>
  <!-- Stripe corners fix -->
  <rect x="4" y="20" width="5" height="8" fill="#3A72C8"/>
  <rect x="79" y="20" width="5" height="8" fill="#3A72C8"/>
  <rect x="4" y="24" width="80" height="4" rx="0" fill="#FF7128"/>

  <!-- Window row -->
  <rect x="10" y="6" width="16" height="11" rx="2" fill="#BEE4F8"/>
  <rect x="31" y="6" width="16" height="11" rx="2" fill="#BEE4F8"/>
  <rect x="52" y="6" width="16" height="11" rx="2" fill="#BEE4F8"/>

  <!-- Window glints -->
  <rect x="11" y="7" width="5" height="3" rx="1" fill="rgba(255,255,255,0.6)"/>
  <rect x="32" y="7" width="5" height="3" rx="1" fill="rgba(255,255,255,0.6)"/>
  <rect x="53" y="7" width="5" height="3" rx="1" fill="rgba(255,255,255,0.6)"/>

  <!-- Front face detail (right side is front in isometric) -->
  <rect x="74" y="6" width="8" height="11" rx="2" fill="#90C8F0"/>
  <rect x="75" y="7" width="3" height="3" rx="1" fill="rgba(255,255,255,0.55)"/>

  <!-- Headlight -->
  <ellipse cx="83" cy="22" rx="3" ry="2.5" fill="#FFFFA0"/>

  <!-- Logo / text area -->
  <rect x="31" y="22" width="26" height="6" rx="1" fill="rgba(255,255,255,0.25)"/>
  <rect x="33" y="23.5" width="22" height="3" rx="0.5" fill="rgba(255,255,255,0.4)"/>

  <!-- Wheel arch cutouts -->
  <ellipse cx="18" cy="34" rx="10" ry="5" fill="#3A72C8"/>
  <ellipse cx="68" cy="34" rx="10" ry="5" fill="#3A72C8"/>

  <!-- Body outline -->
  <rect x="4" y="2" width="80" height="32" rx="5" fill="none" stroke="#2858A8" stroke-width="1"/>
</svg>
