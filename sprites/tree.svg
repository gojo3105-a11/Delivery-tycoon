<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 70" width="52" height="70">
  <!-- Ground shadow -->
  <ellipse cx="26" cy="67" rx="11" ry="3.5" fill="rgba(0,0,0,0.13)"/>

  <!-- Trunk -->
  <rect x="21" y="38" width="10" height="28" rx="3" fill="#7A5030"/>
  <!-- Trunk dark side -->
  <rect x="21" y="40" width="4" height="24" rx="2" fill="#5A3818" opacity="0.45"/>
  <!-- Root bumps -->
  <ellipse cx="18" cy="65" rx="6" ry="3.5" fill="#7A5030"/>
  <ellipse cx="34" cy="65" rx="6" ry="3.5" fill="#7A5030"/>

  <!-- Shadow canopy (depth layer) -->
  <circle cx="15" cy="33" r="15" fill="#246018"/>
  <circle cx="37" cy="33" r="15" fill="#246018"/>
  <circle cx="26" cy="24" r="18" fill="#246018"/>

  <!-- Mid canopy -->
  <circle cx="16" cy="32" r="13" fill="#2E7A20"/>
  <circle cx="36" cy="32" r="13" fill="#2E7A20"/>
  <circle cx="26" cy="22" r="17" fill="#3A9028"/>

  <!-- Bright canopy -->
  <circle cx="18" cy="31" r="11" fill="#48A832"/>
  <circle cx="34" cy="31" r="11" fill="#48A832"/>
  <circle cx="26" cy="21" r="15" fill="#4EB434"/>

  <!-- Top highlight -->
  <circle cx="22" cy="15" r="9"  fill="#6ACC48" opacity="0.75"/>
  <circle cx="20" cy="11" r="5"  fill="#84DC60" opacity="0.55"/>
</svg>
