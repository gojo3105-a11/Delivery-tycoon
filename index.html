<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#FF7128">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="배달 타이쿤">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>고슴도치 배달 타이쿤</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#FFFAEE;
  --surface:#FFFFFF;
  --card:#FFFFFF;
  --accent:#FF7128;
  --accent-dk:#CC5010;
  --green:#2DC761;
  --green-dk:#1E9A48;
  --gold:#FFC107;
  --gold-dk:#CC9800;
  --gem:#9C40F5;
  --gem-dk:#7520CC;
  --text:#1A0800;
  --text2:#6B4830;
  --muted:#B09880;
  --danger:#FF3B30;
  --sh:0 2px 12px rgba(26,8,0,.07);
  --sh-md:0 4px 24px rgba(26,8,0,.12);
  --r-card:16px;
  --r-pill:99px;
}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro Rounded','Segoe UI',system-ui,sans-serif;height:100%;overflow:hidden;-webkit-font-smoothing:antialiased}
#app{display:flex;flex-direction:column;height:100dvh;height:100vh;max-width:480px;margin:0 auto}

/* ── HEADER ─────────────────────────────────── */
#header{
  background:var(--surface);
  box-shadow:0 1px 0 rgba(26,8,0,.06);
  padding:10px 14px 8px;
  padding-top:max(env(safe-area-inset-top,10px),10px);
  flex-shrink:0;
}
.currency-row{display:flex;gap:8px;align-items:center}
.cpill{
  display:flex;align-items:center;gap:5px;
  padding:5px 13px 5px 9px;
  border-radius:var(--r-pill);
  font-weight:800;font-size:17px;font-variant-numeric:tabular-nums;
  letter-spacing:-.5px;
}
.cpill.gold{background:#FFF8DC;color:#7A4F00;border:1.5px solid #FFE066}
.cpill.gem {background:#F2EAFF;color:#5B10C0;border:1.5px solid #C8A0FF}
.cpill .ci{font-size:19px}
.info-row{display:flex;align-items:center;justify-content:space-between;margin-top:4px}
#rps-display{font-size:12px;color:var(--muted)}
#rps-display span{color:var(--green);font-weight:700}
#prestige-badge{
  font-size:11px;background:#FFF8DC;border:1px solid #FFE066;
  border-radius:var(--r-pill);padding:2px 9px;color:#7A4F00;display:none;font-weight:700;
}

/* ── TAP CARD ────────────────────────────────── */
#tap-area{
  flex-shrink:0;margin:10px 12px 0;
  background:var(--surface);border-radius:var(--r-card);box-shadow:var(--sh);
  display:flex;align-items:center;gap:14px;padding:11px 14px;
  user-select:none;cursor:pointer;touch-action:manipulation;
  transition:transform .08s;
}
#tap-area:active{transform:scale(.985)}
#hog-canvas{
  display:block;border-radius:50%;flex-shrink:0;
  background:radial-gradient(circle at 40% 35%,#FFF5E8,#FFE5C0);
  border:2.5px solid #FFD090;
  box-shadow:0 2px 14px rgba(255,113,40,.18);
}
.tap-info{flex:1;display:flex;flex-direction:column;gap:7px}
#tap-hint{font-size:14px;color:var(--text2);line-height:1.45}
#tap-hint strong{color:var(--accent);font-size:15px}
.mul-row{display:flex;gap:6px;flex-wrap:wrap}
.mul-tag{
  font-size:10px;font-weight:800;padding:3px 9px;border-radius:var(--r-pill);
  line-height:1.4;
}
.mul-tag.z{background:#E6FAF0;color:#0F7A38;border:1px solid #90EAAA}
.mul-tag.c{background:#F2EAFF;color:#5B10C0;border:1px solid #C8A0FF}

/* ── CONTENT AREA ────────────────────────────── */
#content-area{flex:1;position:relative;overflow:hidden;margin-top:10px}
.tab-panel{
  position:absolute;inset:0;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  display:none;padding:0 12px 20px;
}
.tab-panel::-webkit-scrollbar{width:4px}
.tab-panel::-webkit-scrollbar-thumb{background:rgba(26,8,0,.08);border-radius:2px}
.tab-panel.on{display:block}

/* section headers */
.sh{display:flex;align-items:center;justify-content:space-between;margin:12px 0 8px}
.sh-title{font-size:11px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--text2)}
.sh-note{font-size:11px;color:var(--muted)}
.pres-trigger{
  font-size:11px;font-weight:700;
  background:#FFF8DC;border:1.5px solid #FFE066;border-radius:var(--r-pill);
  padding:4px 12px;color:#7A4F00;cursor:pointer;
}

/* ── FACILITY CARDS ──────────────────────────── */
.fac-card{
  background:var(--card);border-radius:var(--r-card);box-shadow:var(--sh);
  margin-bottom:8px;padding:11px 12px;
  display:flex;align-items:center;gap:10px;
  transition:box-shadow .2s;
}
.fac-card.affordable{box-shadow:0 0 0 2px var(--accent),var(--sh)}
.fac-bubble{
  width:48px;height:48px;border-radius:14px;flex-shrink:0;
  background:linear-gradient(140deg,#FFF2E0,#FFDDB0);
  display:flex;align-items:center;justify-content:center;
  font-size:26px;transition:transform .1s;
}
.fac-card.affordable .fac-bubble{transform:scale(1.05)}
.fac-body{flex:1;min-width:0}
.fac-name{font-size:13px;font-weight:800;color:var(--text)}
.fac-meta{display:flex;align-items:center;gap:6px;margin-top:3px}
.lv-pill{
  font-size:10px;font-weight:800;
  background:#FFF2E0;color:var(--accent);
  border-radius:6px;padding:1px 7px;
}
.fac-rps{font-size:11px;color:var(--green);font-weight:700}
.prog-wrap{height:4px;background:#F0E8DC;border-radius:2px;margin-top:6px;overflow:hidden}
.prog-bar{
  height:100%;border-radius:2px;
  background:linear-gradient(90deg,var(--accent),#FFAA50);
  transition:width .4s cubic-bezier(.4,0,.2,1);
}
.action-btn{
  background:var(--accent);border:none;border-radius:12px;
  padding:8px 10px;color:#fff;font-weight:800;font-size:11px;
  cursor:pointer;flex-shrink:0;min-width:72px;text-align:center;line-height:1.35;
  box-shadow:0 4px 0 var(--accent-dk);
  transition:transform .08s,box-shadow .08s;
}
.action-btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--accent-dk)}
.action-btn:disabled{
  background:#E0D8D0;box-shadow:0 4px 0 #C0B8B0;
  color:var(--muted);cursor:default;
}
.action-btn:disabled:active{transform:none;box-shadow:0 4px 0 #C0B8B0}
.btn-price{display:block;font-size:10px;opacity:.88;margin-top:1px}

/* ── ZONE CARDS ──────────────────────────────── */
.zone-card{
  background:var(--card);border-radius:var(--r-card);box-shadow:var(--sh);
  margin-bottom:8px;padding:11px 12px;
  display:flex;align-items:center;gap:10px;
}
.zone-card.unlocked{
  background:linear-gradient(135deg,#EDFFF5,#F5FFF9);
  box-shadow:0 2px 12px rgba(45,199,97,.10);
}
.zone-card.affordable{box-shadow:0 0 0 2px var(--accent),var(--sh)}
.zone-bubble{
  width:48px;height:48px;border-radius:14px;flex-shrink:0;
  background:linear-gradient(140deg,#F0F8F0,#D8F0E0);
  display:flex;align-items:center;justify-content:center;font-size:26px;
}
.zone-card:not(.unlocked) .zone-bubble{background:linear-gradient(140deg,#F0EAE0,#EAE0D8)}
.zone-body{flex:1;min-width:0}
.zone-name{font-size:13px;font-weight:800;color:var(--text)}
.zone-mul{font-size:11px;color:var(--green);font-weight:700;margin-top:3px}
.zone-card:not(.unlocked):not(.affordable) .zone-mul{color:var(--muted)}
.active-badge{
  background:#DAFCE8;border:1.5px solid #86EFAC;border-radius:var(--r-pill);
  padding:5px 12px;font-size:11px;color:#14532D;font-weight:800;flex-shrink:0;
}
.zone-btn{
  background:var(--green);border:none;border-radius:12px;
  padding:8px 10px;color:#fff;font-weight:800;font-size:11px;
  cursor:pointer;flex-shrink:0;min-width:72px;text-align:center;line-height:1.35;
  box-shadow:0 4px 0 var(--green-dk);
  transition:transform .08s,box-shadow .08s;
}
.zone-btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--green-dk)}
.zone-btn:disabled{
  background:#E0D8D0;box-shadow:0 4px 0 #C0B8B0;
  color:var(--muted);cursor:default;
}
.zone-btn:disabled:active{transform:none;box-shadow:0 4px 0 #C0B8B0}
.lock-chip{
  background:#F0EAE0;border-radius:10px;padding:6px 10px;
  font-size:18px;flex-shrink:0;
}

/* ── COURIER TAB ─────────────────────────────── */
.recruit-row{display:flex;gap:8px;margin-bottom:4px}
.recruit-card{
  flex:1;background:var(--card);border-radius:var(--r-card);box-shadow:var(--sh);
  padding:14px 10px;text-align:center;cursor:pointer;border:2px solid transparent;
  transition:transform .1s,box-shadow .1s;
}
.recruit-card:active{transform:scale(.965)}
.recruit-card.coin{border-color:#FFE066}
.recruit-card.gem {border-color:#C8A0FF}
.rc-icon{font-size:28px;margin-bottom:6px}
.rc-title{font-size:13px;font-weight:800;color:var(--text)}
.rc-price{font-size:14px;font-weight:800;margin-top:5px}
.recruit-card.coin .rc-price{color:#7A4F00}
.recruit-card.gem  .rc-price{color:#5B10C0}
.rc-sub{font-size:10px;color:var(--muted);margin-top:3px}

.courier-card{
  background:var(--card);border-radius:var(--r-card);box-shadow:var(--sh);
  margin-bottom:8px;padding:11px 12px;
  display:flex;align-items:center;gap:10px;
  border-left:4px solid var(--muted);
}
.co-bubble{
  width:42px;height:42px;border-radius:12px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:22px;
}
.co-body{flex:1;min-width:0}
.co-name{font-size:13px;font-weight:800;color:var(--text)}
.co-bonus{font-size:11px;color:var(--green);font-weight:700;margin-top:3px}
.rar-pill{
  padding:3px 10px;border-radius:var(--r-pill);
  font-size:10px;font-weight:800;flex-shrink:0;
}
.empty{text-align:center;padding:38px 20px;color:var(--muted)}
.empty .ei{font-size:42px;margin-bottom:8px}
.empty p{font-size:13px;line-height:1.6}

/* ── BOTTOM TAB BAR ──────────────────────────── */
#tab-bar{
  flex-shrink:0;display:flex;
  background:var(--surface);
  box-shadow:0 -1px 0 rgba(26,8,0,.07);
  padding-bottom:max(env(safe-area-inset-bottom,8px),8px);
}
.tab-btn{
  flex:1;background:none;border:none;
  padding:7px 0 4px;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
}
.tab-ico{font-size:22px;line-height:1}
.tab-lbl{font-size:10px;font-weight:700;color:var(--muted)}
.tab-dot{width:5px;height:5px;border-radius:50%;background:transparent;margin-top:1px}
.tab-btn.active .tab-lbl{color:var(--accent)}
.tab-btn.active .tab-dot{background:var(--accent)}

/* ── PARTICLES ───────────────────────────────── */
.particle{
  position:fixed;pointer-events:none;
  font-weight:800;color:var(--gold-dk);font-size:15px;
  z-index:999;animation:float .85s ease-out forwards;
  text-shadow:0 1px 3px rgba(0,0,0,.1);
}
@keyframes float{
  0%{opacity:1;transform:translateY(0) scale(1)}
  100%{opacity:0;transform:translateY(-68px) scale(1.3)}
}

/* ── OVERLAYS ────────────────────────────────── */
.overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,.45);
  display:none;align-items:center;justify-content:center;
  z-index:200;padding:24px;
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
}
.overlay.show{display:flex}
.popup{
  background:var(--surface);border-radius:24px;
  padding:0 22px 24px;
  width:100%;max-width:340px;text-align:center;
  box-shadow:0 12px 48px rgba(26,8,0,.22);overflow:hidden;
}
.popup-stripe{height:6px;margin-bottom:20px}
.popup-stripe.orange{background:linear-gradient(90deg,#FF7128,#FFB060)}
.popup-stripe.gold  {background:linear-gradient(90deg,#FFC107,#FFE066)}
.popup h2{font-size:21px;font-weight:900;color:var(--text);margin-bottom:6px}
.popup .sub{font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.5}
.reward-num{font-size:36px;font-weight:900;color:var(--gold-dk);margin-bottom:4px;font-variant-numeric:tabular-nums}
.reward-sub{font-size:12px;color:var(--muted);margin-bottom:20px}
.big-btn{
  width:100%;background:var(--accent);border:none;border-radius:var(--r-pill);
  padding:14px;color:#fff;font-size:16px;font-weight:800;cursor:pointer;
  box-shadow:0 4px 0 var(--accent-dk);transition:transform .08s,box-shadow .08s;
}
.big-btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--accent-dk)}
.pres-bonus{font-size:20px;font-weight:900;color:var(--green);margin:12px 0}
.pres-warn{font-size:12px;color:var(--danger);margin-bottom:20px}
.btn-row{display:flex;gap:10px}
.cancel-btn{
  flex:1;background:#F0E8DC;border:none;border-radius:var(--r-pill);
  padding:12px;color:var(--muted);font-size:14px;font-weight:700;cursor:pointer;
}
.confirm-btn{
  flex:1;background:var(--gold);border:none;border-radius:var(--r-pill);
  padding:12px;color:#fff;font-size:14px;font-weight:800;cursor:pointer;
  box-shadow:0 4px 0 var(--gold-dk);transition:transform .08s,box-shadow .08s;
}
.confirm-btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--gold-dk)}

/* recruit result */
.rr-card{border-radius:16px;padding:20px;margin:12px 0}
.rr-emoji{font-size:52px;display:block}
.rr-rarity{font-size:12px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;margin-top:8px}
.rr-name{font-size:22px;font-weight:900;color:var(--text);margin-top:4px}
.rr-bonus{font-size:14px;color:var(--green);font-weight:700;margin-top:4px}
.big-btn.gem-btn{background:var(--gem);box-shadow:0 4px 0 var(--gem-dk)}
.big-btn.gem-btn:active{box-shadow:0 1px 0 var(--gem-dk)}

/* ── TOAST ───────────────────────────────────── */
#toast{
  position:fixed;top:16px;left:50%;
  transform:translateX(-50%) translateY(-90px);
  background:var(--text);color:#fff;
  border-radius:var(--r-pill);padding:10px 20px;
  font-size:13px;font-weight:700;z-index:300;
  transition:transform .28s cubic-bezier(.34,1.56,.64,1);
  white-space:nowrap;pointer-events:none;
  box-shadow:0 4px 20px rgba(26,8,0,.35);
}
#toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">

  <div id="header">
    <div class="currency-row">
      <div class="cpill gold"><span class="ci">💰</span><span id="coin-val">10</span></div>
      <div class="cpill gem"> <span class="ci">💎</span><span id="gem-val">50</span></div>
    </div>
    <div class="info-row">
      <div id="rps-display">초당 <span id="rps-val">0.0</span> 코인</div>
      <div id="prestige-badge">⭐ <span id="prestige-val">0</span>회 프레스티지</div>
    </div>
  </div>

  <div id="tap-area" ontouchstart="onTap(event)" onclick="onTap(event)">
    <canvas id="hog-canvas" width="106" height="106"></canvas>
    <div class="tap-info">
      <div id="tap-hint">🦔 탭해서 배달!<br><strong>+<span id="click-pow">1</span>/탭</strong></div>
      <div class="mul-row">
        <span class="mul-tag z">구역×<span id="zone-mul-val">1.0</span></span>
        <span class="mul-tag c">택배원×<span id="courier-mul-val">1.00</span></span>
      </div>
    </div>
  </div>

  <div id="content-area">

    <div id="tab-fac" class="tab-panel on">
      <div class="sh">
        <span class="sh-title">시설 업그레이드</span>
        <button class="pres-trigger" onclick="showPrestige()">⭐ 프레스티지</button>
      </div>
      <div id="facility-list"></div>
    </div>

    <div id="tab-zone" class="tab-panel">
      <div class="sh">
        <span class="sh-title">배달 구역</span>
        <span class="sh-note">배율 합산 적용</span>
      </div>
      <div id="zone-list"></div>
    </div>

    <div id="tab-courier" class="tab-panel">
      <div class="sh"><span class="sh-title">택배원 모집</span></div>
      <div class="recruit-row">
        <button class="recruit-card coin" onclick="recruitBasic()">
          <div class="rc-icon">📦</div>
          <div class="rc-title">일반 모집</div>
          <div class="rc-price">💰 500</div>
          <div class="rc-sub">일반~전설 등급</div>
        </button>
        <button class="recruit-card gem" onclick="recruitPremium()">
          <div class="rc-icon">✨</div>
          <div class="rc-title">프리미엄 모집</div>
          <div class="rc-price">💎 300</div>
          <div class="rc-sub">희귀~신화 등급</div>
        </button>
      </div>
      <div class="sh" style="margin-top:6px">
        <span class="sh-title">보유 택배원 <span id="courier-count">0</span>명</span>
      </div>
      <div id="courier-list"></div>
    </div>

  </div>

  <div id="tab-bar">
    <button class="tab-btn active" onclick="switchTab('fac')">
      <span class="tab-ico">📦</span>
      <span class="tab-lbl">시설</span>
      <span class="tab-dot"></span>
    </button>
    <button class="tab-btn" onclick="switchTab('zone')">
      <span class="tab-ico">🗺️</span>
      <span class="tab-lbl">구역</span>
      <span class="tab-dot"></span>
    </button>
    <button class="tab-btn" onclick="switchTab('courier')">
      <span class="tab-ico">🦔</span>
      <span class="tab-lbl">택배원</span>
      <span class="tab-dot"></span>
    </button>
  </div>

</div>

<!-- offline reward -->
<div id="offline-overlay" class="overlay">
  <div class="popup">
    <div class="popup-stripe orange"></div>
    <h2>🌙 오프라인 보상!</h2>
    <p class="sub" id="offline-time-text"></p>
    <div class="reward-num">💰 <span id="offline-reward-val">0</span></div>
    <p class="reward-sub">배달이 계속됐어요</p>
    <button class="big-btn" onclick="claimOffline()">받기 🎉</button>
  </div>
</div>

<!-- prestige -->
<div id="prestige-overlay" class="overlay">
  <div class="popup">
    <div class="popup-stripe gold"></div>
    <h2>⭐ 프레스티지 리셋</h2>
    <p class="sub">코인·시설·구역 초기화<br>택배원과 💎젬은 유지됩니다</p>
    <div class="pres-bonus">수익 보너스 +<span id="pres-bonus-val">5</span>% 영구 적용</div>
    <p class="pres-warn">⚠️ 현재 코인과 시설 레벨이 0으로 초기화됩니다</p>
    <div class="btn-row">
      <button class="cancel-btn" onclick="closePrestige()">취소</button>
      <button class="confirm-btn" onclick="doPrestige()">리셋하기</button>
    </div>
  </div>
</div>

<!-- recruit result -->
<div id="recruit-overlay" class="overlay" onclick="closeRecruit()">
  <div class="popup" onclick="event.stopPropagation()">
    <div class="popup-stripe orange"></div>
    <h2>🎉 새 택배원 영입!</h2>
    <div class="rr-card" id="rr-card">
      <div class="rr-emoji" id="rr-emoji">🦔</div>
      <div class="rr-rarity" id="rr-rarity">일반</div>
      <div class="rr-name"  id="rr-name">쏜이</div>
      <div class="rr-bonus" id="rr-bonus">+2% 수익 보너스</div>
    </div>
    <button class="big-btn" onclick="closeRecruit()">배달 출발! 🚀</button>
  </div>
</div>

<div id="toast"></div>

<script>
/* ── DATA ─────────────────────────────────────── */
const FAC=[
  {id:'packing', name:'포장 테이블',     emoji:'📦',baseCost:15,     baseRPS:.1,   cMul:1.15,rMul:1.10},
  {id:'bag',     name:'배달 가방',       emoji:'🎒',baseCost:110,    baseRPS:.5,   cMul:1.15,rMul:1.10},
  {id:'belt',    name:'분류 벨트',       emoji:'⚙️',baseCost:1200,   baseRPS:4,    cMul:1.15,rMul:1.10},
  {id:'scooter', name:'스쿠터 도크',     emoji:'🛵',baseCost:13000,  baseRPS:28,   cMul:1.15,rMul:1.10},
  {id:'battery', name:'배터리 충전기',   emoji:'🔋',baseCost:140000, baseRPS:200,  cMul:1.15,rMul:1.10},
  {id:'snackbar',name:'스낵 바',         emoji:'🍡',baseCost:1.5e6,  baseRPS:1400, cMul:1.15,rMul:1.10},
  {id:'dispatch',name:'배차 보드',       emoji:'📋',baseCost:2e7,    baseRPS:10000,cMul:1.15,rMul:1.10},
  {id:'auto',    name:'자동 정산 데스크',emoji:'🤖',baseCost:3.5e8,  baseRPS:80000,cMul:1.15,rMul:1.10},
];
const ZONES=[
  {id:'alley',       name:'골목 배달소', unlockCost:0,      mul:1.0,   emoji:'🏘️'},
  {id:'residential', name:'주택가',      unlockCost:2000,   mul:2.0,   emoji:'🏠'},
  {id:'commercial',  name:'상업지구',    unlockCost:20000,  mul:4.0,   emoji:'🏪'},
  {id:'industrial',  name:'산업단지',    unlockCost:200000, mul:8.0,   emoji:'🏭'},
  {id:'newtown',     name:'신도시',      unlockCost:2e6,    mul:16.0,  emoji:'🏙️'},
  {id:'downtown',    name:'도심',        unlockCost:2e7,    mul:30.0,  emoji:'🌆'},
  {id:'harbor',      name:'항구',        unlockCost:2e8,    mul:55.0,  emoji:'⛵'},
  {id:'airport',     name:'공항',        unlockCost:2e9,    mul:100.0, emoji:'✈️'},
  {id:'global',      name:'글로벌 허브', unlockCost:2e10,   mul:200.0, emoji:'🌍'},
  {id:'future',      name:'미래 도시',   unlockCost:2e11,   mul:400.0, emoji:'🚀'},
];
const RARITY=[
  {name:'일반', color:'#888090',bg:'rgba(136,128,144,.12)',mul:1.0},
  {name:'희귀', color:'#2080E8',bg:'rgba(32,128,232,.12)', mul:1.5},
  {name:'에픽', color:'#9C40F5',bg:'rgba(156,64,245,.12)', mul:2.5},
  {name:'전설', color:'#E8920A',bg:'rgba(232,146,10,.12)', mul:4.0},
  {name:'신화', color:'#EE3890',bg:'rgba(238,56,144,.12)', mul:7.0},
];
const R_EMOJI=['⚪','🔵','🟣','🟠','🌸'];
const COURIER_NAMES=[
  ['쏜이','바늘이','고슴이','동글이','찌릿이'],
  ['스피디','터보','제트','퀵킥','플래시'],
  ['캡틴 바늘','매직 고슴','썬더','스톰','골든 바늘'],
  ['알파 가시','스타','드래곤 고슴','나이트','크리스탈'],
  ['우주 배달러','고슴 신','타임 가시','가이아','오메가'],
];
const BASIC_RATES  =[.60,.25,.10,.04,.01];
const PREMIUM_RATES=[  0,.30,.35,.25,.10];
const MILESTONES=[
  [100,   '첫 100 코인! 🎊',  0],
  [1000,  '1,000 코인 돌파!', 5],
  [10000, '1만 코인 달성!',   10],
  [1e5,   '10만 코인! 💰',    20],
  [1e6,   '백만 코인! 💎',    50],
  [1e9,   '십억 코인! 🌟',    100],
  [1e12,  '조 코인!! 🔥',     500],
];

/* ── STATE ────────────────────────────────────── */
let S={coins:10,gems:50,totalEarned:0,fac:{},unlockedZones:['alley'],couriers:[],prestigeLevel:0,lastSave:''};
let offlineCoins=0,offlineSecs=0,hogJiggle=0,lastMilestone=-1;
let lastTime=performance.now(),lastRender=0,saveTimer=0,zoneTimer=0;
let activeTab='fac';

/* ── FORMULAS ─────────────────────────────────── */
const lv     = id => S.fac[id]||0;
const cost   = f  => Math.ceil(f.baseCost*Math.pow(f.cMul,lv(f.id)));
const facRPS = f  => { const l=lv(f.id); return l ? f.baseRPS*Math.pow(f.rMul,l-1) : 0; };
const zoneMul    = () => ZONES.filter(z=>S.unlockedZones.includes(z.id)).reduce((s,z)=>s+z.mul,0);
const courierMul = () => 1+S.couriers.reduce((s,c)=>s+RARITY[c.rarity].mul*.02,0);
const pMul       = () => 1+S.prestigeLevel*.05;
const totalRPS   = () => FAC.reduce((s,f)=>s+facRPS(f),0)*zoneMul()*courierMul()*pMul();
const clickPow   = () => Math.max(1,totalRPS()*.1);

function fmt(n){
  if(n<1e3)return Math.floor(n).toString();
  const U=['','K','M','B','T','Qa','Qi','Sx'];
  const i=Math.min(Math.floor(Math.log10(Math.abs(n))/3),U.length-1);
  const v=n/Math.pow(1000,i);
  return(v>=100?v.toFixed(1):v.toFixed(2))+U[i];
}
function fmtTime(s){
  if(s<60)return Math.floor(s)+'초';
  if(s<3600)return Math.floor(s/60)+'분';
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);
  return m?h+'시간 '+m+'분':h+'시간';
}

/* ── SAVE / LOAD ──────────────────────────────── */
function save(){S.lastSave=new Date().toISOString();localStorage.setItem('hdt_v4',JSON.stringify(S));}
function load(){
  try{
    let d=JSON.parse(localStorage.getItem('hdt_v4')||'null');
    if(!d){
      const v3=JSON.parse(localStorage.getItem('hdt_v3')||'null');
      if(v3)d=Object.assign({},v3,{gems:50,unlockedZones:['alley'],couriers:[]});
    }
    if(!d)return;
    S.coins=d.coins||0;
    S.gems=d.gems!=null?d.gems:50;
    S.totalEarned=d.totalEarned||0;
    S.fac=d.fac||{};
    S.unlockedZones=d.unlockedZones||['alley'];
    S.couriers=d.couriers||[];
    S.prestigeLevel=d.prestigeLevel||0;
    if(d.lastSave){
      offlineSecs=Math.max(0,Math.min((Date.now()-new Date(d.lastSave))/1000,8*3600));
      if(offlineSecs>60)offlineCoins=totalRPS()*offlineSecs*.5;
    }
    for(let i=MILESTONES.length-1;i>=0;i--){
      if(S.totalEarned>=MILESTONES[i][0]){lastMilestone=i;break;}
    }
  }catch(e){}
}

/* ── TABS ─────────────────────────────────────── */
function switchTab(tab){
  activeTab=tab;
  const keys=['fac','zone','courier'];
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',keys[i]===tab));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.toggle('on',p.id==='tab-'+tab));
  if(tab==='zone')renderZones();
  if(tab==='courier')renderCouriers();
}

/* ── INTERACTION ──────────────────────────────── */
function onTap(e){
  e.preventDefault();
  const p=clickPow();
  S.coins+=p;S.totalEarned+=p;hogJiggle=10;
  const src=e.changedTouches?e.changedTouches[0]:e;
  spawnParticle(src.clientX,src.clientY,'+'+fmt(p));
  checkMilestones();
}
function upgrade(id){
  const f=FAC.find(x=>x.id===id),c=cost(f);
  if(S.coins<c)return;
  S.coins-=c;S.fac[id]=lv(id)+1;
  showToast(f.emoji+' '+f.name+' Lv.'+lv(id));
  renderFacilities();save();
}
function unlockZone(id){
  const z=ZONES.find(x=>x.id===id);
  if(!z||S.unlockedZones.includes(id))return;
  if(S.coins<z.unlockCost){showToast('💰 코인이 부족해요!');return;}
  S.coins-=z.unlockCost;
  S.unlockedZones.push(id);
  showToast(z.emoji+' '+z.name+' 개방! 배율 +×'+z.mul);
  renderZones();save();
}
function recruitBasic(){
  if(S.coins<500){showToast('💰 코인이 부족해요! (500 필요)');return;}
  S.coins-=500;doRecruit(BASIC_RATES);save();
}
function recruitPremium(){
  if(S.gems<300){showToast('💎 젬이 부족해요! (300 필요)');return;}
  S.gems-=300;doRecruit(PREMIUM_RATES);save();
}
function doRecruit(rates){
  const r=Math.random();let acc=0,rarity=rates.length-1;
  for(let i=0;i<rates.length;i++){if(!rates[i])continue;acc+=rates[i];if(r<acc){rarity=i;break;}}
  const names=COURIER_NAMES[rarity];
  const courier={rarity,name:names[Math.floor(Math.random()*names.length)],id:Date.now()};
  S.couriers.push(courier);
  showRecruitResult(courier);renderCouriers();
}
function showRecruitResult(c){
  const R=RARITY[c.rarity];
  const card=document.getElementById('rr-card');
  card.style.cssText='background:'+R.bg+';border-radius:16px;padding:20px;margin:12px 0;border:1.5px solid '+R.color+'50';
  document.getElementById('rr-emoji').textContent=R_EMOJI[c.rarity];
  document.getElementById('rr-rarity').textContent=R.name;
  document.getElementById('rr-rarity').style.color=R.color;
  document.getElementById('rr-name').textContent=c.name;
  document.getElementById('rr-bonus').textContent='+'+Math.round(R.mul*.02*100)+'% 수익 보너스';
  document.getElementById('recruit-overlay').classList.add('show');
}
function closeRecruit(){document.getElementById('recruit-overlay').classList.remove('show');}
function claimOffline(){
  S.coins+=offlineCoins;S.totalEarned+=offlineCoins;offlineCoins=0;
  document.getElementById('offline-overlay').classList.remove('show');
  renderFacilities();save();
}
function showPrestige(){
  document.getElementById('pres-bonus-val').textContent=(S.prestigeLevel+1)*5;
  document.getElementById('prestige-overlay').classList.add('show');
}
function closePrestige(){document.getElementById('prestige-overlay').classList.remove('show');}
function doPrestige(){
  S.prestigeLevel++;S.coins=0;S.totalEarned=0;S.fac={};S.unlockedZones=['alley'];lastMilestone=-1;
  closePrestige();
  document.getElementById('prestige-badge').style.display='block';
  document.getElementById('prestige-val').textContent=S.prestigeLevel;
  showToast('⭐ 프레스티지 '+S.prestigeLevel+'회! 수익 +'+(S.prestigeLevel*5)+'%');
  renderFacilities();if(activeTab==='zone')renderZones();save();
}

/* ── UTILS ────────────────────────────────────── */
function spawnParticle(x,y,text){
  const el=document.createElement('div');
  el.className='particle';el.textContent=text;
  el.style.cssText='left:'+(x-16)+'px;top:'+(y-16)+'px';
  document.body.appendChild(el);setTimeout(()=>el.remove(),900);
}
function checkMilestones(){
  for(let i=lastMilestone+1;i<MILESTONES.length;i++){
    if(S.totalEarned>=MILESTONES[i][0]){
      const gems=MILESTONES[i][2];
      if(gems>0){S.gems+=gems;showToast('🎉 '+MILESTONES[i][1]+' 💎+'+gems);}
      else showToast('🎉 '+MILESTONES[i][1]);
      lastMilestone=i;
    }else break;
  }
}
let toastTimer;
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2600);
}

/* ── RENDER ───────────────────────────────────── */
function renderFacilities(){
  const list=document.getElementById('facility-list');
  list.innerHTML='';
  FAC.forEach(f=>{
    const l=lv(f.id),c=cost(f),rps=facRPS(f),can=S.coins>=c;
    const pct=l===0?0:(l%10===0?100:(l%10)/10*100);
    const div=document.createElement('div');
    div.className='fac-card'+(can?' affordable':'');
    div.innerHTML=
      `<div class="fac-bubble">${f.emoji}</div>
       <div class="fac-body">
         <div class="fac-name">${f.name}</div>
         <div class="fac-meta">
           <span class="lv-pill">Lv.${l}</span>
           ${l>0?`<span class="fac-rps">+${fmt(rps)}/초</span>`:''}
         </div>
         <div class="prog-wrap"><div class="prog-bar" style="width:${pct}%"></div></div>
       </div>
       <button class="action-btn"${can?'':' disabled'} onclick="upgrade('${f.id}')">
         ${l===0?'구매':'업그레이드'}
         <span class="btn-price">💰 ${fmt(c)}</span>
       </button>`;
    list.appendChild(div);
  });
}
function renderZones(){
  const list=document.getElementById('zone-list');
  list.innerHTML='';
  ZONES.forEach((z,idx)=>{
    const unlocked=S.unlockedZones.includes(z.id);
    const prevOk=idx===0||S.unlockedZones.includes(ZONES[idx-1].id);
    const avail=!unlocked&&prevOk;
    const can=avail&&S.coins>=z.unlockCost;
    const div=document.createElement('div');
    div.className='zone-card'+(unlocked?' unlocked':can?' affordable':'');
    let right='';
    if(unlocked){
      right=`<span class="active-badge">✓ 개방중</span>`;
    }else if(avail){
      right=`<button class="zone-btn"${can?'':' disabled'} onclick="unlockZone('${z.id}')">
               개방<span class="btn-price">💰 ${fmt(z.unlockCost)}</span>
             </button>`;
    }else{
      right=`<span class="lock-chip">🔒</span>`;
    }
    div.innerHTML=
      `<div class="zone-bubble">${z.emoji}</div>
       <div class="zone-body">
         <div class="zone-name">${z.name}</div>
         <div class="zone-mul">배율 +×${z.mul}</div>
       </div>${right}`;
    list.appendChild(div);
  });
}
function renderCouriers(){
  document.getElementById('courier-count').textContent=S.couriers.length;
  const list=document.getElementById('courier-list');
  list.innerHTML='';
  if(!S.couriers.length){
    list.innerHTML=
      `<div class="empty">
         <div class="ei">🦔</div>
         <p>아직 택배원이 없어요!<br>위 버튼으로 고슴도치를 영입하세요</p>
       </div>`;
    return;
  }
  [...S.couriers].sort((a,b)=>b.rarity-a.rarity).forEach(c=>{
    const R=RARITY[c.rarity];
    const div=document.createElement('div');
    div.className='courier-card';
    div.style.borderLeftColor=R.color;
    div.innerHTML=
      `<div class="co-bubble" style="background:${R.bg}">${R_EMOJI[c.rarity]}</div>
       <div class="co-body">
         <div class="co-name">${c.name}</div>
         <div class="co-bonus">+${Math.round(R.mul*.02*100)}% 수익 보너스</div>
       </div>
       <span class="rar-pill" style="background:${R.bg};color:${R.color};border:1px solid ${R.color}50">${R.name}</span>`;
    list.appendChild(div);
  });
}
function updateAffordability(){
  document.querySelectorAll('.fac-card').forEach((card,i)=>{
    if(!FAC[i])return;
    const can=S.coins>=cost(FAC[i]);
    card.classList.toggle('affordable',can);
    const btn=card.querySelector('.action-btn');
    if(btn)btn.disabled=!can;
  });
}

/* ── TICK ─────────────────────────────────────── */
function tick(now){
  const dt=Math.min((now-lastTime)/1000,.5);lastTime=now;
  const income=totalRPS()*dt;
  if(income>0){S.coins+=income;S.totalEarned+=income;checkMilestones();}
  if(hogJiggle>0)hogJiggle=Math.max(0,hogJiggle-dt*28);
  saveTimer+=dt;if(saveTimer>=30){save();saveTimer=0;}
  zoneTimer+=dt;
  if(now-lastRender>=100){
    document.getElementById('coin-val').textContent=fmt(S.coins);
    document.getElementById('gem-val').textContent=fmt(S.gems);
    document.getElementById('rps-val').textContent=fmt(totalRPS());
    document.getElementById('click-pow').textContent=fmt(clickPow());
    document.getElementById('zone-mul-val').textContent=zoneMul().toFixed(1);
    document.getElementById('courier-mul-val').textContent=courierMul().toFixed(2);
    updateAffordability();
    if(activeTab==='zone'&&zoneTimer>1.5){renderZones();zoneTimer=0;}
    lastRender=now;
  }
  drawHog(now);
  requestAnimationFrame(tick);
}

/* ── DRAW HEDGEHOG ────────────────────────────── */
function drawHog(now){
  const canvas=document.getElementById('hog-canvas');
  const ctx=canvas.getContext('2d');
  const w=canvas.width,h=canvas.height;
  ctx.clearRect(0,0,w,h);
  const t=now/1000;
  const sc=w/130;
  ctx.save();ctx.scale(sc,sc);
  const jx=hogJiggle>0?Math.sin(t*28)*hogJiggle*.45:0;
  const bob=Math.sin(t*1.6)*1.8;
  const cx=65+jx,cy=65+bob;
  /* shadow */
  ctx.beginPath();ctx.ellipse(65,cy+34,22,5,0,0,Math.PI*2);
  ctx.fillStyle='rgba(120,60,20,.18)';ctx.fill();
  /* body */
  ctx.beginPath();ctx.ellipse(cx,cy+5,28,20,0,0,Math.PI*2);
  ctx.fillStyle='#5A4030';ctx.fill();
  /* belly */
  ctx.beginPath();ctx.ellipse(cx+3,cy+8,17,13,0,0,Math.PI*2);
  ctx.fillStyle='#E8C890';ctx.fill();
  /* spines */
  ctx.strokeStyle='#6A4C34';ctx.lineWidth=2.2;ctx.lineCap='round';
  for(let i=0;i<12;i++){
    const a=-0.85+i*.195+Math.sin(t*2.5+i*.5)*.035;
    const bx=cx-1+Math.cos(a+Math.PI)*18,by=cy+Math.sin(a+Math.PI)*14;
    const len=11+Math.sin(t*3.5+i)*1.2;
    ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx-Math.cos(a)*len,by-Math.sin(a)*len);ctx.stroke();
  }
  /* head */
  ctx.beginPath();ctx.ellipse(cx+22,cy-2,14,11,-.18,0,Math.PI*2);
  ctx.fillStyle='#E8C890';ctx.fill();
  /* eye */
  ctx.beginPath();ctx.arc(cx+28,cy-4,2.8,0,Math.PI*2);ctx.fillStyle='#2A1400';ctx.fill();
  ctx.beginPath();ctx.arc(cx+29,cy-5,.9,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  /* nose */
  ctx.beginPath();ctx.arc(cx+35,cy-.5,2.2,0,Math.PI*2);ctx.fillStyle='#E06050';ctx.fill();
  /* package */
  const px=cx+18,py=cy+15+Math.sin(t*2.8)*1.2;
  ctx.fillStyle='#FF7128';ctx.fillRect(px-9,py-6,18,12);
  ctx.strokeStyle='#FFD030';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(px,py-6);ctx.lineTo(px,py+6);
  ctx.moveTo(px-9,py);ctx.lineTo(px+9,py);ctx.stroke();
  /* legs */
  ctx.strokeStyle='#E8C890';ctx.lineWidth=2.8;ctx.lineCap='round';
  const sw=Math.sin(t*4.5)*4;
  ctx.beginPath();ctx.moveTo(cx-7,cy+22);ctx.lineTo(cx-7,cy+33+sw);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+7,cy+22);ctx.lineTo(cx+7,cy+33-sw);ctx.stroke();
  ctx.restore();
}

/* ── INIT ─────────────────────────────────────── */
function init(){
  load();
  if(offlineSecs>60&&offlineCoins>0){
    document.getElementById('offline-time-text').textContent=fmtTime(offlineSecs)+' 동안 자리를 비웠어요';
    document.getElementById('offline-reward-val').textContent=fmt(offlineCoins);
    document.getElementById('offline-overlay').classList.add('show');
  }
  if(S.prestigeLevel>0){
    document.getElementById('prestige-badge').style.display='block';
    document.getElementById('prestige-val').textContent=S.prestigeLevel;
  }
  renderFacilities();renderZones();renderCouriers();
  document.getElementById('coin-val').textContent=fmt(S.coins);
  document.getElementById('gem-val').textContent=fmt(S.gems);
  if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
  requestAnimationFrame(tick);
}
window.addEventListener('load',init);
window.addEventListener('pagehide',save);
window.addEventListener('blur',save);
</script>
</body>
