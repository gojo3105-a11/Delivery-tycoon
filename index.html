<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#FF7A30">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="배달 타이쿤">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>고슴도치 배달 타이쿤</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0C0F1A;--surface:#141828;--card:#1C2035;--border:#262D48;
  --accent:#FF7A30;--teal:#3DC8B8;--gold:#FFCC44;--text:#F0EDE6;--muted:#8892B5;
  --danger:#FF4D6A;
}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,'Segoe UI',sans-serif;height:100%;overflow:hidden}
#app{display:flex;flex-direction:column;height:100dvh;height:100vh;max-width:480px;margin:0 auto}

#header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 16px;padding-top:max(env(safe-area-inset-top,12px),12px);flex-shrink:0}
#coins-display{font-size:36px;font-weight:800;color:var(--gold);line-height:1.1;font-variant-numeric:tabular-nums;letter-spacing:-1px}
#rps-row{display:flex;align-items:center;justify-content:space-between;margin-top:3px}
#rps-display{font-size:13px;color:var(--muted)}
#rps-display span{color:var(--teal);font-weight:700}
#prestige-badge{font-size:11px;background:rgba(255,204,68,.12);border:1px solid rgba(255,204,68,.3);border-radius:10px;padding:2px 8px;color:var(--gold);display:none}

#tap-area{flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 16px 6px;position:relative;user-select:none;cursor:pointer;touch-action:manipulation}
#hog-canvas{display:block;border-radius:50%;background:radial-gradient(circle at 38% 32%,#1e2540,#080b14);border:2px solid var(--border);box-shadow:0 4px 24px rgba(0,0,0,.5)}
#tap-hint{margin-top:6px;font-size:12px;color:var(--muted)}
#click-badge{position:absolute;top:10px;right:10px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:12px;color:var(--accent);font-weight:700}

.section-label{padding:8px 16px 4px;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:600;flex-shrink:0;background:var(--bg);display:flex;align-items:center;justify-content:space-between}
.section-label button{font-size:11px;background:none;border:1px solid var(--border);border-radius:8px;padding:3px 8px;color:var(--muted);cursor:pointer}

#facility-list{flex:1;overflow-y:auto;padding:0 10px 16px;-webkit-overflow-scrolling:touch}
#facility-list::-webkit-scrollbar{width:4px}
#facility-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.fac-card{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;padding:11px 12px;display:flex;align-items:center;gap:10px;transition:border-color .2s}
.fac-card.affordable{border-color:rgba(255,122,48,.45)}
.fac-emoji{font-size:26px;flex-shrink:0;width:34px;text-align:center}
.fac-info{flex:1;min-width:0}
.fac-name{font-size:14px;font-weight:700;color:var(--text)}
.fac-meta{font-size:11px;color:var(--muted);margin-top:1px}
.fac-rps{font-size:12px;color:var(--teal);font-weight:600;margin-top:2px}
.fac-btn{background:var(--accent);border:none;border-radius:8px;padding:8px 10px;color:#fff;font-weight:800;font-size:12px;cursor:pointer;flex-shrink:0;min-width:76px;text-align:center;transition:opacity .15s,transform .1s;line-height:1.3}
.fac-btn:active{transform:scale(.94)}
.fac-btn:disabled{background:var(--border);color:var(--muted);cursor:default}
.fac-btn .btn-cost{display:block;font-size:11px;font-weight:600;opacity:.85}

.particle{position:fixed;pointer-events:none;font-weight:800;color:var(--gold);font-size:15px;z-index:999;animation:floatUp .85s ease-out forwards}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-72px) scale(1.3)}}

#offline-overlay,#prestige-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);display:none;align-items:center;justify-content:center;z-index:200;padding:24px}
#offline-overlay.show,#prestige-overlay.show{display:flex}
#offline-popup,#prestige-popup{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:28px 22px;width:100%;max-width:340px;text-align:center}
#offline-popup h2,#prestige-popup h2{font-size:22px;font-weight:800;margin-bottom:6px}
#prestige-popup h2{color:var(--gold)}
#prestige-popup{border-color:rgba(255,204,68,.3)}
.ot,.pres-desc{font-size:13px;color:var(--muted);margin-bottom:14px}
.reward-coin{font-size:40px;font-weight:800;color:var(--gold);margin-bottom:4px;font-variant-numeric:tabular-nums}
.reward-sub{font-size:12px;color:var(--muted);margin-bottom:22px}
.claim-btn{width:100%;background:var(--accent);border:none;border-radius:12px;padding:14px;color:#fff;font-size:16px;font-weight:800;cursor:pointer}
.pres-bonus{font-size:20px;font-weight:800;color:var(--teal);margin:12px 0}
.pres-warn{font-size:12px;color:var(--danger);margin-bottom:20px}
.pres-btns{display:flex;gap:10px}
.pres-cancel{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px;color:var(--muted);font-size:14px;font-weight:700;cursor:pointer}
.pres-confirm{flex:1;background:var(--gold);border:none;border-radius:12px;padding:12px;color:#1a0a00;font-size:14px;font-weight:800;cursor:pointer}

#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-90px);background:var(--surface);border:1px solid var(--accent);border-radius:20px;padding:8px 18px;font-size:13px;font-weight:600;color:var(--text);z-index:300;transition:transform .28s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="coins-display">💰 <span id="coin-val">10</span></div>
    <div id="rps-row">
      <div id="rps-display">초당 <span id="rps-val">0.0</span> 코인</div>
      <div id="prestige-badge">⭐ <span id="prestige-val">0</span>회 프레스티지</div>
    </div>
  </div>

  <div id="tap-area" ontouchstart="onTap(event)" onclick="onTap(event)">
    <div id="click-badge">탭 +<span id="click-pow">1</span></div>
    <canvas id="hog-canvas" width="130" height="130"></canvas>
    <div id="tap-hint">🦔 탭해서 배달!</div>
  </div>

  <div class="section-label">
    <span>시설 업그레이드</span>
    <button onclick="showPrestige()">⭐ 프레스티지</button>
  </div>
  <div id="facility-list"></div>
</div>

<div id="offline-overlay">
  <div id="offline-popup">
    <h2>🌙 오프라인 보상!</h2>
    <p class="ot" id="offline-time-text"></p>
    <div class="reward-coin">💰 <span id="offline-reward-val">0</span></div>
    <p class="reward-sub">배달이 계속됐어요</p>
    <button class="claim-btn" onclick="claimOffline()">받기 🎉</button>
  </div>
</div>

<div id="prestige-overlay">
  <div id="prestige-popup">
    <h2>⭐ 프레스티지 리셋</h2>
    <p class="pres-desc">모든 코인과 시설이 초기화됩니다.</p>
    <div class="pres-bonus">수익 보너스 +<span id="pres-bonus-val">5</span>% 영구 적용</div>
    <p class="pres-warn">⚠️ 현재 코인과 시설 레벨이 모두 0으로 돌아갑니다</p>
    <div class="pres-btns">
      <button class="pres-cancel" onclick="closePrestige()">취소</button>
      <button class="pres-confirm" onclick="doPrestige()">리셋하기</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const FAC=[
  {id:'packing', name:'포장 테이블',    emoji:'📦',baseCost:15,     baseRPS:.1,   cMul:1.15,rMul:1.10},
  {id:'bag',     name:'배달 가방',      emoji:'🎒',baseCost:110,    baseRPS:.5,   cMul:1.15,rMul:1.10},
  {id:'belt',    name:'분류 벨트',      emoji:'⚙️',baseCost:1200,   baseRPS:4,    cMul:1.15,rMul:1.10},
  {id:'scooter', name:'스쿠터 도크',    emoji:'🛵',baseCost:13000,  baseRPS:28,   cMul:1.15,rMul:1.10},
  {id:'battery', name:'배터리 충전기',  emoji:'🔋',baseCost:140000, baseRPS:200,  cMul:1.15,rMul:1.10},
  {id:'snackbar',name:'스낵 바',        emoji:'🍡',baseCost:1.5e6,  baseRPS:1400, cMul:1.15,rMul:1.10},
  {id:'dispatch',name:'배차 보드',      emoji:'📋',baseCost:2e7,    baseRPS:10000,cMul:1.15,rMul:1.10},
  {id:'auto',    name:'자동 정산 데스크',emoji:'🤖',baseCost:3.5e8, baseRPS:80000,cMul:1.15,rMul:1.10},
];
const MILESTONES=[
  [100,'첫 100 코인! 🎊'],[1000,'1,000 코인 돌파!'],[10000,'1만 코인 도달! 💰'],
  [1e5,'10만 코인! 🚀'],[1e6,'백만장자! 💎'],[1e9,'십억! 🌟'],[1e12,'조만장자!! 🔥'],
];

let S={coins:10,totalEarned:0,fac:{},prestigeLevel:0,lastSave:new Date().toISOString()};
let offlineCoins=0,offlineSecs=0,hogJiggle=0,lastMilestone=-1;
let lastTime=performance.now(),lastRender=0,saveTimer=0;

const lv=id=>S.fac[id]||0;
const cost=f=>Math.ceil(f.baseCost*Math.pow(f.cMul,lv(f.id)));
const facRPS=f=>{const l=lv(f.id);return l?f.baseRPS*Math.pow(f.rMul,l-1):0;};
const totalRPS=()=>FAC.reduce((s,f)=>s+facRPS(f),0);
const clickPow=()=>Math.max(1,totalRPS()*.1);
const pMul=()=>1+S.prestigeLevel*.05;

function fmt(n){
  if(n<1e3)return Math.floor(n).toString();
  const U=['','K','M','B','T','Qa','Qi','Sx'];
  const i=Math.min(Math.floor(Math.log10(Math.abs(n))/3),U.length-1);
  const v=n/Math.pow(1000,i);
  return(v>=100?v.toFixed(1):v.toFixed(2))+U[i];
}
function fmtTime(s){
  if(s<60)return Math.floor(s)+'초';
  if(s<3600)return Math.floor(s/60)+'분';
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);
  return m?h+'시간 '+m+'분':h+'시간';
}

function save(){S.lastSave=new Date().toISOString();localStorage.setItem('hdt_v3',JSON.stringify(S));}
function load(){
  try{
    const d=JSON.parse(localStorage.getItem('hdt_v3')||'null');
    if(!d)return;
    S.coins=d.coins||0;S.totalEarned=d.totalEarned||0;
    S.fac=d.fac||{};S.prestigeLevel=d.prestigeLevel||0;
    if(d.lastSave){
      offlineSecs=Math.max(0,Math.min((Date.now()-new Date(d.lastSave))/1000,8*3600));
      if(offlineSecs>60)offlineCoins=totalRPS()*offlineSecs*.5*pMul();
    }
  }catch(e){}
}

function onTap(e){
  e.preventDefault();
  const p=clickPow()*pMul();
  S.coins+=p;S.totalEarned+=p;hogJiggle=10;
  const src=e.changedTouches?e.changedTouches[0]:e;
  spawnParticle(src.clientX,src.clientY,'+'+fmt(p));
  checkMilestones();updateAffordability();
}
function upgrade(id){
  const f=FAC.find(x=>x.id===id),c=cost(f);
  if(S.coins<c)return;
  S.coins-=c;S.fac[id]=lv(id)+1;
  showToast(f.emoji+' '+f.name+' Lv.'+lv(id));
  renderFacilities();save();
}
function claimOffline(){
  S.coins+=offlineCoins;S.totalEarned+=offlineCoins;offlineCoins=0;
  document.getElementById('offline-overlay').classList.remove('show');
  renderFacilities();save();
}
function showPrestige(){
  document.getElementById('pres-bonus-val').textContent=(S.prestigeLevel+1)*5;
  document.getElementById('prestige-overlay').classList.add('show');
}
function closePrestige(){document.getElementById('prestige-overlay').classList.remove('show');}
function doPrestige(){
  S.prestigeLevel++;S.coins=0;S.totalEarned=0;S.fac={};lastMilestone=-1;
  closePrestige();
  const b=document.getElementById('prestige-badge');
  b.style.display='block';
  document.getElementById('prestige-val').textContent=S.prestigeLevel;
  showToast('⭐ 프레스티지 '+S.prestigeLevel+'회! 수익 +'+(S.prestigeLevel*5)+'%');
  renderFacilities();save();
}

function spawnParticle(x,y,text){
  const el=document.createElement('div');
  el.className='particle';el.textContent=text;
  el.style.cssText='left:'+(x-16)+'px;top:'+(y-16)+'px';
  document.body.appendChild(el);setTimeout(()=>el.remove(),900);
}

function checkMilestones(){
  for(let i=lastMilestone+1;i<MILESTONES.length;i++){
    if(S.totalEarned>=MILESTONES[i][0]){showToast('🎉 '+MILESTONES[i][1]);lastMilestone=i;}
    else break;
  }
}
let toastTimer;
function showToast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.classList.remove('show'),2600);
}

function renderFacilities(){
  const list=document.getElementById('facility-list');
  list.innerHTML='';
  FAC.forEach(f=>{
    const l=lv(f.id),c=cost(f),rps=facRPS(f),can=S.coins>=c;
    const div=document.createElement('div');
    div.className='fac-card'+(can?' affordable':'');
    div.innerHTML=`<div class="fac-emoji">${f.emoji}</div>
      <div class="fac-info">
        <div class="fac-name">${f.name}</div>
        <div class="fac-meta">Lv.${l}</div>
        ${l>0?`<div class="fac-rps">+${fmt(rps)}/초</div>`:''}
      </div>
      <button class="fac-btn"${can?'':' disabled'} onclick="upgrade('${f.id}')">
        ${l===0?'구매':'업그레이드'}
        <span class="btn-cost">💰 ${fmt(c)}</span>
      </button>`;
    list.appendChild(div);
  });
}
function updateAffordability(){
  document.querySelectorAll('.fac-card').forEach((card,i)=>{
    if(!FAC[i])return;
    const can=S.coins>=cost(FAC[i]);
    card.classList.toggle('affordable',can);
    const btn=card.querySelector('.fac-btn');
    if(btn)btn.disabled=!can;
  });
}

function tick(now){
  const dt=Math.min((now-lastTime)/1000,.5);lastTime=now;
  const income=totalRPS()*dt*pMul();
  if(income>0){S.coins+=income;S.totalEarned+=income;checkMilestones();}
  if(hogJiggle>0)hogJiggle=Math.max(0,hogJiggle-dt*28);
  saveTimer+=dt;if(saveTimer>=30){save();saveTimer=0;}
  if(now-lastRender>=100){
    document.getElementById('coin-val').textContent=fmt(S.coins);
    document.getElementById('rps-val').textContent=fmt(totalRPS()*pMul());
    document.getElementById('click-pow').textContent=fmt(clickPow()*pMul());
    updateAffordability();lastRender=now;
  }
  drawHog(now);
  requestAnimationFrame(tick);
}

function drawHog(now){
  const canvas=document.getElementById('hog-canvas');
  const ctx=canvas.getContext('2d');
  const w=canvas.width,h=canvas.height;
  ctx.clearRect(0,0,w,h);
  const t=now/1000;
  const jx=hogJiggle>0?Math.sin(t*28)*hogJiggle*.45:0;
  const bob=Math.sin(t*1.6)*1.8;
  const cx=w/2+jx,cy=h/2+bob;
  // shadow
  ctx.beginPath();ctx.ellipse(w/2,cy+34,22,5,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,.3)';ctx.fill();
  // body
  ctx.beginPath();ctx.ellipse(cx,cy+5,28,20,0,0,Math.PI*2);
  ctx.fillStyle='#4a3728';ctx.fill();
  // belly
  ctx.beginPath();ctx.ellipse(cx+3,cy+8,17,13,0,0,Math.PI*2);
  ctx.fillStyle='#d4aa80';ctx.fill();
  // spines
  ctx.strokeStyle='#7a5c44';ctx.lineWidth=2.2;ctx.lineCap='round';
  for(let i=0;i<12;i++){
    const a=-0.85+i*.195+Math.sin(t*2.5+i*.5)*.035;
    const bx=cx-1+Math.cos(a+Math.PI)*18,by=cy+Math.sin(a+Math.PI)*14;
    const len=11+Math.sin(t*3.5+i)*1.2;
    ctx.beginPath();ctx.moveTo(bx,by);ctx.lineTo(bx-Math.cos(a)*len,by-Math.sin(a)*len);ctx.stroke();
  }
  // head
  ctx.beginPath();ctx.ellipse(cx+22,cy-2,14,11,-.18,0,Math.PI*2);
  ctx.fillStyle='#d4aa80';ctx.fill();
  // eye
  ctx.beginPath();ctx.arc(cx+28,cy-4,2.8,0,Math.PI*2);ctx.fillStyle='#1a0a00';ctx.fill();
  ctx.beginPath();ctx.arc(cx+29,cy-5,.9,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  // nose
  ctx.beginPath();ctx.arc(cx+35,cy-.5,2.2,0,Math.PI*2);ctx.fillStyle='#e87060';ctx.fill();
  // package
  const px=cx+18,py=cy+15+Math.sin(t*2.8)*1.2;
  ctx.fillStyle='#FF7A30';ctx.fillRect(px-9,py-6,18,12);
  ctx.strokeStyle='#FFD93D';ctx.lineWidth=1.4;
  ctx.beginPath();ctx.moveTo(px,py-6);ctx.lineTo(px,py+6);
  ctx.moveTo(px-9,py);ctx.lineTo(px+9,py);ctx.stroke();
  // legs
  ctx.strokeStyle='#d4aa80';ctx.lineWidth=2.8;ctx.lineCap='round';
  const sw=Math.sin(t*4.5)*4;
  ctx.beginPath();ctx.moveTo(cx-7,cy+22);ctx.lineTo(cx-7,cy+33+sw);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+7,cy+22);ctx.lineTo(cx+7,cy+33-sw);ctx.stroke();
}

function init(){
  load();
  if(offlineSecs>60&&offlineCoins>0){
    document.getElementById('offline-time-text').textContent=fmtTime(offlineSecs)+' 동안 자리를 비웠어요';
    document.getElementById('offline-reward-val').textContent=fmt(offlineCoins);
    document.getElementById('offline-overlay').classList.add('show');
  }
  if(S.prestigeLevel>0){
    document.getElementById('prestige-badge').style.display='block';
    document.getElementById('prestige-val').textContent=S.prestigeLevel;
  }
  renderFacilities();
  document.getElementById('coin-val').textContent=fmt(S.coins);
  if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(()=>{});
  requestAnimationFrame(tick);
}
window.addEventListener('load',init);
window.addEventListener('pagehide',save);
window.addEventListener('blur',save);
</script>
</body>
</html>
