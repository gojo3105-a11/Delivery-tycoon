<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 36" width="48" height="36">
  <!-- Back legs -->
  <ellipse cx="8" cy="32" rx="4.5" ry="5.5" fill="#4A3020"/>
  <ellipse cx="23" cy="33" rx="4.5" ry="5.5" fill="#4A3020"/>

  <!-- Spines -->
  <polygon points="2,14 0,5 6,7"   fill="#6A4C34"/>
  <polygon points="7,10 5,1 11,3"  fill="#7A5A3C"/>
  <polygon points="13,8 11,0 17,1" fill="#6A4C34"/>
  <polygon points="19,7 17,0 23,1" fill="#7A5A3C"/>

  <!-- Body -->
  <ellipse cx="17" cy="21" rx="16" ry="11" fill="#5A4030"/>

  <!-- Belly -->
  <ellipse cx="20" cy="23" rx="10" ry="7.5" fill="#E8C890"/>

  <!-- Package (orange delivery box) -->
  <rect x="24" y="12" width="17" height="13" rx="2.5" fill="#FF7128"/>
  <rect x="24" y="12" width="17" height="13" rx="2.5" fill="none" stroke="#CC5010" stroke-width="0.8"/>
  <!-- Ribbon vertical -->
  <rect x="31.5" y="12" width="2" height="13" fill="rgba(255,255,255,0.65)"/>
  <!-- Ribbon horizontal -->
  <rect x="24" y="18" width="17" height="2" fill="rgba(255,255,255,0.65)"/>

  <!-- Head -->
  <circle cx="34" cy="15" r="10.5" fill="#5A4030"/>

  <!-- Snout -->
  <ellipse cx="42" cy="18" rx="6.5" ry="4" fill="#E8C890"/>

  <!-- Eye white -->
  <circle cx="37" cy="11" r="3.5" fill="white"/>
  <!-- Eye pupil -->
  <circle cx="38" cy="11" r="2"   fill="#1A0800"/>
  <!-- Eye shine -->
  <circle cx="39.2" cy="9.8" r="0.8" fill="white"/>

  <!-- Nose -->
  <circle cx="45" cy="18" r="2.4" fill="#FF8080"/>

  <!-- Ear outer -->
  <ellipse cx="30" cy="6" rx="3.8" ry="5" fill="#5A4030"/>
  <!-- Ear inner -->
  <ellipse cx="30" cy="6" rx="2.2" ry="3" fill="#FF9090"/>
</svg>
